name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
  # workflow_run:
  #   workflows: ["Build Monorepo Site"]
  #   types:
  #     - completed

permissions:
  contents: read
  pages: write
  id-token: write
 
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build site with specific user
        run: npm run build
        env:
          SHOW_ALL_USER: ${{ vars.SHOW_ALL_USER }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: monorepo-site
          path: dist/
          retention-days: 1
